[[permission]]
identifier = "allow-app-commands"
description = "Allow GPMS dashboard shell, system info, and config file read."
commands.allow = [
  "execute_command",
  "get_system_info",
  "read_config",
  "script_start",
  "script_watch",
  "script_suspend",
  "script_resume",
  "croc_send",
  "croc_receive",
  "croc_send_running",
]
